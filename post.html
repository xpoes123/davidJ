<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Jiang — Writing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #14131a;
    --bg-2: #1c1b25;
    --fg: #e8e3d8;
    --fg-soft: #a8a39a;
    --fg-dim: #6b6862;
    --accent: #d4a955;
    --rule: rgba(255,255,255,0.10);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Newsreader', Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    background: radial-gradient(ellipse at 50% 0%, #1f1d2c 0%, #14131a 60%);
    min-height: 100vh;
  }

  /* progress bar */
  .progress {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    width: 0;
    background: var(--accent);
    z-index: 100;
    transition: width 0.05s linear;
  }

  /* top nav */
  .topbar {
    position: sticky;
    top: 0;
    background: rgba(20, 19, 26, 0.85);
    backdrop-filter: blur(8px);
    z-index: 10;
    border-bottom: 1px solid var(--rule);
  }
  .topbar-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 18px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Space Grotesk', sans-serif;
  }
  .topbar a {
    color: var(--fg-soft);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: color 0.2s ease;
  }
  .topbar a:hover { color: var(--fg); }
  .topbar .site {
    color: var(--fg);
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.02em;
    text-transform: none;
  }

  /* article container */
  article {
    max-width: 680px;
    margin: 0 auto;
    padding: 80px 28px 140px;
  }

  /* meta block (date + reading time, above title) */
  .post-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg-dim);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .post-meta .dot { margin: 0 8px; opacity: 0.6; }

  /* article typography */
  .content {
    font-size: 18px;
    line-height: 1.75;
    color: var(--fg);
  }
  .content h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 38px;
    font-weight: 500;
    line-height: 1.18;
    letter-spacing: -0.005em;
    margin: 0 0 36px;
    color: var(--fg);
  }
  .content h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 500;
    line-height: 1.3;
    margin: 56px 0 16px;
    color: var(--fg);
  }
  .content h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 500;
    margin: 36px 0 12px;
    color: var(--fg);
  }
  .content p {
    margin: 0 0 22px;
  }
  .content a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(212, 169, 85, 0.4);
    transition: border-color 0.2s ease, background 0.15s ease;
  }
  .content a:hover {
    border-bottom-color: var(--accent);
    background: rgba(212, 169, 85, 0.08);
  }
  .content strong { color: var(--fg); font-weight: 500; }
  .content em { color: var(--fg-soft); }
  .content blockquote {
    margin: 28px 0;
    padding: 4px 0 4px 24px;
    border-left: 2px solid var(--accent);
    color: var(--fg-soft);
    font-style: italic;
    font-size: 19px;
  }
  .content blockquote p:last-child { margin-bottom: 0; }
  .content hr {
    border: none;
    height: 1px;
    background: var(--rule);
    margin: 48px auto;
    width: 60%;
  }
  .content ul, .content ol {
    padding-left: 1.6em;
    margin: 0 0 22px;
  }
  .content li { margin-bottom: 8px; }
  .content code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: rgba(255,255,255,0.07);
    padding: 1px 6px;
    border-radius: 3px;
    color: #f0d99c;
  }
  .content pre {
    background: var(--bg-2);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 18px 20px;
    overflow-x: auto;
    margin: 24px 0;
    line-height: 1.5;
  }
  .content pre code {
    background: none;
    padding: 0;
    color: var(--fg);
    font-size: 14px;
  }
  .content img { max-width: 100%; border-radius: 4px; margin: 24px 0; }
  .content table {
    border-collapse: collapse;
    width: 100%;
    margin: 24px 0;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
  }
  .content th, .content td {
    border-bottom: 1px solid var(--rule);
    padding: 10px 14px;
    text-align: left;
  }
  .content th { color: var(--fg-soft); font-weight: 500; }

  /* footer */
  .post-footer {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 28px 80px;
    text-align: center;
    font-family: 'Space Grotesk', sans-serif;
    color: var(--fg-dim);
    font-size: 13px;
  }
  .post-footer a {
    color: var(--fg-soft);
    text-decoration: none;
    letter-spacing: 0.14em;
    font-size: 11px;
    text-transform: uppercase;
    border: 1px solid var(--rule);
    padding: 10px 18px;
    transition: color 0.2s ease, border-color 0.2s ease;
  }
  .post-footer a:hover { color: var(--fg); border-color: rgba(255,255,255,0.3); }

  /* loading / error */
  .status {
    text-align: center;
    color: var(--fg-dim);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    margin-top: 40vh;
    letter-spacing: 0.1em;
  }
  .status.error { color: #d68a8a; }

  @media (max-width: 600px) {
    article { padding: 56px 22px 100px; }
    .content { font-size: 17px; }
    .content h1 { font-size: 30px; }
    .content h2 { font-size: 22px; }
  }
</style>
</head>
<body>
  <div class="progress" id="progress"></div>

  <nav class="topbar">
    <div class="topbar-inner">
      <a href="index.html">← back</a>
      <span class="site">David Jiang</span>
      <a href="index.html" style="visibility:hidden">·</a>
    </div>
  </nav>

  <article id="article">
    <div class="status" id="status">loading…</div>
  </article>

  <footer class="post-footer" id="footer" style="display:none">
    <a href="index.html">← back to writing</a>
  </footer>

<script>
const params = new URLSearchParams(location.search);
const slug = params.get('slug');
const article = document.getElementById('article');
const status = document.getElementById('status');
const footer = document.getElementById('footer');

if (!slug) {
  status.className = 'status error';
  status.textContent = 'no post specified — try ?slug=graduating';
} else {
  fetch(`posts/${slug}.md`)
    .then(r => {
      if (!r.ok) throw new Error(`couldn't load post (${r.status})`);
      return r.text();
    })
    .then(md => render(md))
    .catch(e => {
      status.className = 'status error';
      status.textContent = e.message;
    });
}

function render(md) {
  // Parse out the date line (matches "**Date:** ...")
  let date = null;
  md = md.replace(/^\*\*Date:\*\*\s*(.+?)$/m, (m, d) => {
    date = d.trim();
    return '';
  });

  // Parse out title (first H1)
  let title = null;
  md = md.replace(/^#\s+(.+?)$/m, (m, t) => {
    title = t.trim();
    return '';
  });

  // Estimate reading time (rough: 220 wpm)
  const words = md.split(/\s+/).filter(Boolean).length;
  const minutes = Math.max(1, Math.round(words / 220));

  // Render the rest
  const html = marked.parse(md);

  // Build the article
  let header = '';
  if (date || minutes) {
    header += `<div class="post-meta">${date ? date : ''}${date ? '<span class="dot">·</span>' : ''}${minutes} min read</div>`;
  }
  if (title) {
    header += `<h1 style="font-family:'Space Grotesk',sans-serif;font-size:38px;font-weight:500;line-height:1.18;letter-spacing:-0.005em;margin:0 0 36px;color:var(--fg)">${title}</h1>`;
    document.title = `${title} — David Jiang`;
  }

  article.innerHTML = `<div class="content">${header}${html}</div>`;
  footer.style.display = '';

  // Open external links in new tabs
  article.querySelectorAll('a[href^="http"]').forEach(a => {
    a.target = '_blank';
    a.rel = 'noopener';
  });
}

// Reading progress bar
const progress = document.getElementById('progress');
window.addEventListener('scroll', () => {
  const docH = document.documentElement.scrollHeight - window.innerHeight;
  const pct = docH > 0 ? (window.scrollY / docH) * 100 : 0;
  progress.style.width = `${pct}%`;
});
</script>
</body>
</html>
