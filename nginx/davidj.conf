server {
    listen 80;

    # Replace _ with your actual domain (e.g. davidjiang.com)
    server_name _;

    root /var/www/davidj;
    index index.html;

    access_log /var/log/nginx/davidj.access.log;
    error_log  /var/log/nginx/davidj.error.log;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 256;

    # ---------------------------------------------------------------------------
    # Security headers
    # ---------------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---------------------------------------------------------------------------
    # Static file routing — supports clean URLs (e.g. /blog → blog.html)
    # ---------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # ---------------------------------------------------------------------------
    # Long-lived cache for binary/image assets
    # ---------------------------------------------------------------------------
    location ~* \.(jpg|jpeg|png|webp|gif|ico|pdf|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ---------------------------------------------------------------------------
    # Custom error page
    # ---------------------------------------------------------------------------
    error_page 404 /index.html;

    # ---------------------------------------------------------------------------
    # Uncomment to proxy API requests to a backend (Node/Python)
    # location /api/ {
    #     proxy_pass http://127.0.0.1:3000;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    # ---------------------------------------------------------------------------
}

