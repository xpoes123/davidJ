<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14131a; --bg-2: #1c1b25;
    --fg: #e8e3d8; --fg-soft: #a8a39a; --fg-dim: #6b6862;
    --accent: #d4a955; --sessions: #7aa2f7;
    --up: #9ece6a; --down: #f7768e;
    --rule: rgba(255,255,255,0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { background: radial-gradient(ellipse at 50% 0%, #1f1d2c 0%, #14131a 60%); min-height: 100vh; }

  .topbar { position: sticky; top: 0; background: rgba(20,19,26,0.85); backdrop-filter: blur(8px); z-index: 10; border-bottom: 1px solid var(--rule); }
  .topbar-inner { max-width: 980px; margin: 0 auto; padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; font-family: 'Space Grotesk', sans-serif; }
  .topbar a { color: var(--fg-soft); text-decoration: none; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; }
  .topbar a:hover { color: var(--fg); }
  .topbar .site { color: var(--fg); font-weight: 500; font-size: 14px; }

  main { max-width: 980px; margin: 0 auto; padding: 64px 28px 120px; }
  .page-kicker { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.32em; text-transform: uppercase; margin-bottom: 14px; }
  .page-title { font-family: 'Space Grotesk', sans-serif; font-size: 44px; font-weight: 500; margin: 0 0 14px; letter-spacing: -0.01em; }
  .page-sub { font-family: 'Newsreader', serif; font-style: italic; color: var(--fg-soft); margin: 0 0 32px; font-size: 18px; max-width: 560px; }

  /* range switcher */
  .rangebar { display: flex; gap: 8px; margin-bottom: 44px; flex-wrap: wrap; }
  .rangebar button { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; padding: 7px 15px; background: transparent; border: 1px solid var(--rule); color: var(--fg-dim); border-radius: 3px; cursor: pointer; transition: all 0.15s ease; }
  .rangebar button:hover { color: var(--fg); border-color: rgba(255,255,255,0.25); }
  .rangebar button.active { color: #14131a; background: var(--accent); border-color: var(--accent); font-weight: 500; }

  .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 48px; }
  .kpi { padding: 20px; border: 1px solid var(--rule); border-radius: 4px; background: rgba(255,255,255,0.02); }
  .kpi .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-dim); margin-bottom: 10px; }
  .kpi .value { font-family: 'Space Grotesk', sans-serif; font-size: 32px; font-weight: 500; color: var(--fg); line-height: 1; }
  .kpi .delta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--fg-soft); margin-top: 8px; }
  .kpi .delta.up { color: var(--up); }
  .kpi .delta.down { color: var(--down); }

  section { margin-bottom: 52px; }
  section h2 { font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.24em; text-transform: uppercase; color: var(--fg-soft); margin: 0 0 18px; padding-bottom: 10px; border-bottom: 1px solid var(--rule); }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--rule); }
  th { font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-dim); }
  td.num { font-family: 'JetBrains Mono', monospace; text-align: right; color: var(--fg-soft); }
  td.path { font-family: 'JetBrains Mono', monospace; color: var(--fg); }
  td.ref { color: var(--fg-soft); font-size: 13px; word-break: break-all; }
  td .bar { display: inline-block; height: 6px; background: var(--accent); opacity: 0.6; border-radius: 1px; margin-right: 8px; vertical-align: middle; }

  /* chart card */
  .chart-card { padding: 22px 22px 14px; border: 1px solid var(--rule); border-radius: 4px; background: rgba(255,255,255,0.02); margin-bottom: 48px; }
  .chart-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .chart-head .label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-dim); }
  .legend { display: flex; gap: 16px; }
  .legend .item { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--fg-soft); }
  .legend .swatch { width: 10px; height: 10px; border-radius: 2px; }
  .chart-svg { width: 100%; height: 240px; display: block; overflow: visible; }
  .chart-svg .axis { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
  .chart-svg .axis-label { fill: var(--fg-dim); font-family: 'JetBrains Mono', monospace; font-size: 10px; }
  .chart-svg .crosshair { stroke: rgba(255,255,255,0.22); stroke-width: 1; stroke-dasharray: 3 3; }

  /* heatmap */
  .heat { display: grid; grid-template-columns: 34px repeat(24, 1fr); gap: 2px; margin-top: 6px; }
  .heat .hlabel { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--fg-dim); align-self: center; }
  .heat .cell { aspect-ratio: 1 / 1; border-radius: 1px; background: rgba(212,169,85,0.06); }
  .heat .haxis { grid-column: 2 / -1; display: grid; grid-template-columns: repeat(24, 1fr); font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--fg-dim); margin-top: 4px; }
  .heat .haxis span { grid-column: span 6; }

  /* horizontal bar rollups (devices, referrer types) */
  .rollup { display: flex; flex-direction: column; gap: 10px; }
  .rollup .row { display: grid; grid-template-columns: 130px 1fr 44px; align-items: center; gap: 12px; font-size: 13px; }
  .rollup .name { color: var(--fg); font-family: 'JetBrains Mono', monospace; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rollup .track { height: 8px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
  .rollup .fill { height: 100%; background: var(--accent); opacity: 0.75; border-radius: 2px; }
  .rollup .n { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--fg-soft); text-align: right; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }
  .two-col h3, .geo-grid h3 { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fg-dim); margin: 0 0 14px; }

  .geo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  @media (max-width: 640px) { .geo-grid { grid-template-columns: 1fr; } }

  /* session cards */
  .session-card { border: 1px solid var(--rule); border-radius: 4px; background: rgba(255,255,255,0.02); margin-bottom: 12px; overflow: hidden; }
  .session-header { display: flex; gap: 20px; align-items: baseline; flex-wrap: wrap; padding: 14px 18px; cursor: pointer; user-select: none; }
  .session-header:hover { background: rgba(255,255,255,0.03); }
  .session-time { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); min-width: 90px; }
  .session-loc { font-size: 13px; color: var(--fg); font-weight: 500; }
  .session-device { font-size: 12px; color: var(--fg-soft); }
  .session-ref { font-size: 12px; color: var(--fg-dim); font-family: 'JetBrains Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
  .session-body { padding: 0 18px 14px; display: none; }
  .session-body.open { display: block; }
  .session-timeline { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .evt-chip { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 3px 8px; border-radius: 3px; background: rgba(255,255,255,0.05); color: var(--fg-soft); }
  .evt-chip.pageview { color: var(--fg); background: rgba(122,162,247,0.12); }
  .evt-chip.cube_click { color: var(--accent); background: rgba(212,169,85,0.12); }
  .evt-chip.duration { color: #9ece6a; background: rgba(158,206,106,0.10); }
  .session-org { font-size: 11px; color: var(--fg-dim); margin-top: 6px; font-family: 'JetBrains Mono', monospace; }

  .status { text-align: center; color: var(--fg-dim); padding: 80px 0; font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.1em; }
  .status.error { color: #d68a8a; }
  .dim { color: var(--fg-dim); font-size: 13px; }
  body.loading main { opacity: 0.5; transition: opacity 0.15s; }

  /* shared hover tooltip */
  .tip { position: fixed; pointer-events: none; z-index: 60; background: rgba(20,19,26,0.96); border: 1px solid var(--rule); border-radius: 4px; padding: 8px 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--fg); opacity: 0; transition: opacity 0.1s; white-space: nowrap; }

  @media (max-width: 600px) {
    main { padding: 40px 22px 80px; }
    .page-title { font-size: 32px; }
    .kpi .value { font-size: 26px; }
  }
</style>
<script src="analytics.js" defer></script>
</head>
<body>
  <nav class="topbar">
    <div class="topbar-inner">
      <a href="index.html">← back</a>
      <span class="site">David Jiang</span>
      <span></span>
    </div>
  </nav>

  <main>
    <div class="page-kicker">Stats</div>
    <h1 class="page-title">Who's looking?</h1>
    <p class="page-sub">Traffic, sessions, and engagement from the self-hosted analytics service.</p>

    <div class="rangebar" id="rangebar"></div>
    <div id="container"><div class="status">loading…</div></div>
  </main>
  <div class="tip" id="tip"></div>

<script>
const _isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
const ANALYTICS_BASE = window.__ANALYTICS_BASE__ || (_isLocal ? 'http://localhost:8001' : '/api/analytics');
const ENDPOINT = window.__STATS_ENDPOINT__ || (ANALYTICS_BASE + '/stats');
const SUBS_ENDPOINT = ANALYTICS_BASE + '/subscribers';
const SESSIONS_ENDPOINT = ANALYTICS_BASE + '/sessions';

// Private dashboard token. Pass once via ?token=… (bookmark it); cached after.
const _tok = new URLSearchParams(location.search).get('token');
if (_tok) localStorage.setItem('stats_token', _tok);
const TOKEN = _tok || localStorage.getItem('stats_token') || '';
const AUTH = { headers: { 'Authorization': 'Bearer ' + TOKEN } };

const RANGES = [['today', 'Today'], ['7d', '7 Days'], ['30d', '30 Days'], ['90d', '90 Days'], ['all', 'All']];
let RANGE = new URLSearchParams(location.search).get('range') || localStorage.getItem('stats_range') || '7d';
const PV_COLOR = '#d4a955', SE_COLOR = '#7aa2f7';

function renderRangeBar() {
  document.getElementById('rangebar').innerHTML = RANGES.map(([k, label]) =>
    `<button class="${k === RANGE ? 'active' : ''}" onclick="setRange('${k}')">${label}</button>`).join('');
}
function setRange(k) {
  RANGE = k; localStorage.setItem('stats_range', k);
  renderRangeBar(); load();
}

async function load() {
  const c = document.getElementById('container');
  document.body.classList.add('loading');
  try {
    const [statsR, subsR, sessR] = await Promise.all([
      fetch(ENDPOINT + '?range=' + RANGE, AUTH),
      fetch(SUBS_ENDPOINT, AUTH).catch(() => null),
      fetch(SESSIONS_ENDPOINT, AUTH).catch(() => null),
    ]);
    if (statsR.status === 401) throw new Error('unauthorized — add ?token=YOUR_TOKEN to the URL');
    if (!statsR.ok) throw new Error('stats fetch failed (' + statsR.status + ')');
    const s = await statsR.json();
    s.subs = subsR && subsR.ok ? await subsR.json() : { total: 0, recent: [] };
    s.recent_sessions = sessR && sessR.ok ? await sessR.json() : [];
    render(s);
  } catch (e) {
    c.innerHTML = '<div class="status error">' + escapeHtml(e.message) + '</div>';
  } finally {
    document.body.classList.remove('loading');
  }
}

// ---------- formatting ----------
function timeAgo(ms) {
  const sec = Math.floor((Date.now() - ms) / 1000);
  if (sec < 60) return sec + 's ago';
  if (sec < 3600) return Math.floor(sec / 60) + 'm ago';
  if (sec < 86400) return Math.floor(sec / 3600) + 'h ago';
  return Math.floor(sec / 86400) + 'd ago';
}
function fmtSec(s) {
  if (s == null) return '—';
  if (s < 60) return Math.round(s) + 's';
  if (s < 3600) return (s / 60).toFixed(1) + 'm';
  return (s / 3600).toFixed(1) + 'h';
}
function fmtPct(p) { return p == null ? '—' : Math.round(p) + '%'; }
function fmtBucket(t) {
  const d = new Date(t);
  if (RANGE === 'today') return d.getHours() + ':00';
  return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
}
function deltaChip(value, prev) {
  if (prev == null) return '';
  if (prev === 0) return value > 0 ? '<div class="delta up">▲ new</div>' : '<div class="delta">— vs prev</div>';
  const pct = Math.round(((value - prev) / prev) * 100);
  if (pct === 0) return '<div class="delta">— flat vs prev</div>';
  const cls = pct > 0 ? 'up' : 'down';
  return `<div class="delta ${cls}">${pct > 0 ? '▲' : '▼'} ${Math.abs(pct)}% vs prev</div>`;
}
function bar(value, max, w) {
  const pct = max > 0 ? Math.max(2, Math.round((value / max) * (w || 60))) : 0;
  return '<span class="bar" style="width:' + pct + 'px"></span>';
}
function trimRef(r) {
  if (!r) return '—';
  try { const u = new URL(r); return u.hostname + (u.pathname && u.pathname !== '/' ? u.pathname : ''); }
  catch (_) { return r; }
}
function parseUA(ua) {
  if (!ua) return 'Unknown';
  const os = /iPhone/.test(ua) ? 'iPhone' : /iPad/.test(ua) ? 'iPad' : /Android/.test(ua) ? 'Android' :
    /Windows/.test(ua) ? 'Windows' : /Macintosh|Mac OS X/.test(ua) ? 'Mac' : /Linux/.test(ua) ? 'Linux' : '';
  const br = /Edg\//.test(ua) ? 'Edge' : /CriOS|Chrome/.test(ua) ? 'Chrome' : /FxiOS|Firefox/.test(ua) ? 'Firefox' :
    /Safari/.test(ua) ? 'Safari' : '';
  return [os, br].filter(Boolean).join(' · ') || ua.slice(0, 40);
}
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

// ---------- charts ----------
let _line = null; // {pts, plot} for hover

function lineChart(series) {
  if (!series || !series.length) return '<p class="dim">no data in this range</p>';
  const W = 900, H = 240, L = 44, R = 12, T = 12, B = 26;
  const ts = series.map(d => d.t);
  const minT = Math.min(...ts), maxT = Math.max(...ts), spanT = maxT - minT || 1;
  const maxV = Math.max(1, ...series.map(d => d.pageviews), ...series.map(d => d.sessions));
  const x = t => L + (spanT ? (t - minT) / spanT : 0.5) * (W - L - R);
  const y = v => H - B - (v / maxV) * (H - T - B);
  const pts = series.map(d => ({ x: x(d.t), pv: y(d.pageviews), se: y(d.sessions), d }));
  const line = key => 'M ' + pts.map(p => p.x.toFixed(1) + ' ' + p[key].toFixed(1)).join(' L ');
  const area = 'M ' + pts.map(p => p.x.toFixed(1) + ' ' + p.pv.toFixed(1)).join(' L ') +
    ` L ${pts[pts.length - 1].x.toFixed(1)} ${H - B} L ${pts[0].x.toFixed(1)} ${H - B} Z`;
  // y gridlines (0, mid, max)
  const yticks = [0, maxV / 2, maxV].map(v => {
    const yy = y(v);
    return `<line class="axis" x1="${L}" y1="${yy}" x2="${W - R}" y2="${yy}"/>` +
      `<text class="axis-label" x="${L - 6}" y="${yy + 3}" text-anchor="end">${Math.round(v)}</text>`;
  }).join('');
  // x labels (up to 6, evenly)
  const step = Math.max(1, Math.ceil(series.length / 6));
  const xlabels = series.map((d, i) => i % step === 0 || i === series.length - 1
    ? `<text class="axis-label" x="${x(d.t)}" y="${H - 8}" text-anchor="middle">${escapeHtml(fmtBucket(d.t))}</text>` : '').join('');
  const dots = key => pts.map(p => `<circle cx="${p.x}" cy="${p[key]}" r="2.5" fill="${key === 'pv' ? PV_COLOR : SE_COLOR}"/>`).join('');
  _line = { pts, geom: { L, R, W, H, T, B }, maxV };
  return `<svg class="chart-svg" id="lineSvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      ${yticks}
      <path d="${area}" fill="rgba(212,169,85,0.10)"/>
      <path d="${line('se')}" stroke="${SE_COLOR}" stroke-width="2" fill="none"/>
      <path d="${line('pv')}" stroke="${PV_COLOR}" stroke-width="2" fill="none"/>
      ${dots('se')}${dots('pv')}
      <line class="crosshair" id="xhair" x1="0" y1="${T}" x2="0" y2="${H - B}" style="opacity:0"/>
      ${xlabels}
    </svg>`;
}

function wireLineHover() {
  const svg = document.getElementById('lineSvg');
  if (!svg || !_line) return;
  const xhair = document.getElementById('xhair'), tip = document.getElementById('tip');
  svg.addEventListener('mousemove', e => {
    const r = svg.getBoundingClientRect();
    const sx = (e.clientX - r.left) / r.width * _line.geom.W; // to viewBox units
    let best = _line.pts[0], bd = Infinity;
    for (const p of _line.pts) { const d = Math.abs(p.x - sx); if (d < bd) { bd = d; best = p; } }
    xhair.setAttribute('x1', best.x); xhair.setAttribute('x2', best.x); xhair.style.opacity = 1;
    tip.innerHTML = `${escapeHtml(fmtBucket(best.d.t))}<br><span style="color:${PV_COLOR}">■</span> ${best.d.pageviews} views` +
      `<br><span style="color:${SE_COLOR}">■</span> ${best.d.sessions} sessions`;
    tip.style.opacity = 1;
    tip.style.left = Math.min(e.clientX + 14, window.innerWidth - 150) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
  });
  svg.addEventListener('mouseleave', () => { xhair.style.opacity = 0; document.getElementById('tip').style.opacity = 0; });
}

function heatmap(heat) {
  if (!heat || !heat.length) return '<p class="dim">no data</p>';
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  const max = Math.max(1, ...heat.flat());
  let cells = '';
  for (let d = 0; d < 7; d++) {
    cells += `<div class="hlabel">${days[d]}</div>`;
    for (let h = 0; h < 24; h++) {
      const v = heat[d][h] || 0;
      const a = v ? (0.12 + 0.88 * (v / max)) : 0;
      const bg = v ? `background:rgba(212,169,85,${a.toFixed(3)})` : '';
      cells += `<div class="cell" style="${bg}" data-tip="${days[d]} ${h}:00 · ${v} view${v === 1 ? '' : 's'}"></div>`;
    }
  }
  cells += `<div></div><div class="haxis"><span>0:00</span><span>6:00</span><span>12:00</span><span>18:00</span></div>`;
  return `<div class="heat" id="heat">${cells}</div>`;
}

function wireHeatHover() {
  const heat = document.getElementById('heat'), tip = document.getElementById('tip');
  if (!heat) return;
  heat.addEventListener('mousemove', e => {
    const cell = e.target.closest('.cell');
    if (!cell) { tip.style.opacity = 0; return; }
    tip.textContent = cell.dataset.tip;
    tip.style.opacity = 1;
    tip.style.left = Math.min(e.clientX + 14, window.innerWidth - 150) + 'px';
    tip.style.top = (e.clientY - 10) + 'px';
  });
  heat.addEventListener('mouseleave', () => { tip.style.opacity = 0; });
}

function rollup(rows, nameKey, valKey) {
  if (!rows || !rows.length) return '<p class="dim">no data</p>';
  const max = Math.max(...rows.map(r => r[valKey]));
  return '<div class="rollup">' + rows.map(r =>
    `<div class="row"><span class="name">${escapeHtml(r[nameKey])}</span>` +
    `<span class="track"><span class="fill" style="width:${Math.round((r[valKey] / max) * 100)}%"></span></span>` +
    `<span class="n">${r[valKey]}</span></div>`).join('') + '</div>';
}

// ---------- render ----------
function render(s) {
  const se = s.sessions;
  const html = `
    <div class="kpis">
      <div class="kpi"><div class="label">Pageviews</div><div class="value">${s.pageviews.value}</div>${deltaChip(s.pageviews.value, s.pageviews.prev)}</div>
      <div class="kpi"><div class="label">Visitors</div><div class="value">${s.visitors.value}</div>${deltaChip(s.visitors.value, s.visitors.prev)}</div>
      <div class="kpi"><div class="label">New / Returning</div><div class="value">${se.new}<span style="color:var(--fg-dim);font-size:20px"> / ${se.returning}</span></div></div>
      <div class="kpi"><div class="label">Bounce rate</div><div class="value">${se.bounce_rate}%</div></div>
      <div class="kpi"><div class="label">Pages / session</div><div class="value">${se.avg_pages}</div></div>
      <div class="kpi"><div class="label">Avg time on site</div><div class="value">${fmtSec(se.avg_duration_sec)}</div></div>
      <div class="kpi"><div class="label">Unique IPs</div><div class="value">${s.unique_ips.value}</div>${deltaChip(s.unique_ips.value, s.unique_ips.prev)}</div>
      <div class="kpi"><div class="label">Subscribers</div><div class="value">${s.subs.total}</div><div class="delta">${s.subs.recent && s.subs.recent.length ? 'latest ' + new Date(s.subs.recent[0].ts).toLocaleDateString() : 'none yet'}</div></div>
    </div>

    <div class="chart-card">
      <div class="chart-head">
        <span class="label">Traffic over time</span>
        <div class="legend">
          <span class="item"><span class="swatch" style="background:${PV_COLOR}"></span>Pageviews</span>
          <span class="item"><span class="swatch" style="background:${SE_COLOR}"></span>Sessions</span>
        </div>
      </div>
      ${lineChart(s.series)}
    </div>

    <div class="chart-card">
      <div class="chart-head"><span class="label">When they visit · day × hour (UTC)</span></div>
      ${heatmap(s.heatmap)}
    </div>

    <section>
      <div class="two-col">
        <div><h3>Devices</h3>${rollup(s.devices, 'name', 'count')}</div>
        <div><h3>Referrer type</h3>${rollup(
          Object.entries(s.referrer_types).map(([k, v]) => ({ name: k, count: v })).filter(r => r.count).sort((a, b) => b.count - a.count),
          'name', 'count')}</div>
      </div>
    </section>

    <section>
      <h2>Content · what gets read</h2>
      ${tableContent(s.content)}
    </section>

    <section>
      <h2>Top referrers</h2>
      ${tableReferrers(s.top_referrers)}
    </section>

    <section>
      <h2>Geography</h2>
      <div class="geo-grid">
        <div><h3>Countries</h3>${tableGeo(s.top_countries, 'country')}</div>
        <div><h3>Cities</h3>${tableGeo(s.top_cities, 'city')}</div>
      </div>
    </section>

    <section>
      <h2>Cube clicks</h2>
      ${tableCubeClicks(s.cube_clicks)}
    </section>

    <section>
      <h2>Column-label clicks</h2>
      ${tableLabelClicks(s.label_clicks)}
    </section>

    <section>
      <h2>Recent sessions</h2>
      ${renderSessions(s.recent_sessions)}
    </section>
  `;
  document.getElementById('container').innerHTML = html;
  wireLineHover();
  wireHeatHover();
}

// ---------- tables ----------
function tableContent(rows) {
  if (!rows || !rows.length) return '<p class="dim">no data in this range</p>';
  const max = rows[0].views;
  return `<table><thead><tr><th>Path</th><th></th><th class="num">Views</th><th class="num">Avg time</th><th class="num">Scroll</th></tr></thead><tbody>` +
    rows.map(r => `<tr><td class="path">${escapeHtml(r.page)}</td><td>${bar(r.views, max)}</td>` +
      `<td class="num">${r.views}</td><td class="num">${r.avg_time ? fmtSec(r.avg_time) : '—'}</td>` +
      `<td class="num">${r.avg_scroll ? r.avg_scroll + '%' : '—'}</td></tr>`).join('') + `</tbody></table>`;
}
function tableGeo(rows, key) {
  if (!rows || !rows.length) return '<p class="dim">no geo data yet</p>';
  return `<table><thead><tr><th>${key === 'city' ? 'City' : 'Country'}</th><th class="num">Visitors</th><th class="num">PV</th></tr></thead><tbody>` +
    rows.map(r => `<tr><td class="ref">${escapeHtml(r[key] || '—')}${key === 'city' && r.country ? ' <span style="color:var(--fg-dim)">· ' + escapeHtml(r.country) + '</span>' : ''}</td>` +
      `<td class="num">${r.visitors || '—'}</td><td class="num">${r.pageviews}</td></tr>`).join('') + `</tbody></table>`;
}
function tableReferrers(rows) {
  if (!rows || !rows.length) return '<p class="dim">no external referrers in this range</p>';
  const max = rows[0].count;
  return `<table><thead><tr><th>Source</th><th></th><th class="num">Hits</th></tr></thead><tbody>` +
    rows.map(r => `<tr><td class="ref">${escapeHtml(trimRef(r.ref))}</td><td>${bar(r.count, max)}</td><td class="num">${r.count}</td></tr>`).join('') + `</tbody></table>`;
}
function tableCubeClicks(rows) {
  if (!rows || !rows.length) return '<p class="dim">no clicks in this range</p>';
  const max = rows[0].count;
  return `<table><thead><tr><th>Cube</th><th>Stack</th><th></th><th class="num">Clicks</th></tr></thead><tbody>` +
    rows.map(r => `<tr><td class="path">${escapeHtml(r.cube || '')}</td><td class="ref">${escapeHtml(r.stack || '')}</td><td>${bar(r.count, max)}</td><td class="num">${r.count}</td></tr>`).join('') + `</tbody></table>`;
}
function tableLabelClicks(rows) {
  if (!rows || !rows.length) return '<p class="dim">no label clicks in this range</p>';
  const max = rows[0].count;
  return `<table><thead><tr><th>Label</th><th></th><th class="num">Clicks</th></tr></thead><tbody>` +
    rows.map(r => `<tr><td class="ref">${escapeHtml(r.stack || '')}</td><td>${bar(r.count, max)}</td><td class="num">${r.count}</td></tr>`).join('') + `</tbody></table>`;
}

// ---------- sessions ----------
function evtChip(e) {
  let label = e.type;
  if (e.type === 'pageview') label = e.page || '/';
  else if (e.type === 'cube_click') { try { label = 'click:' + (JSON.parse(e.data || '{}').cube || '?'); } catch (_) {} }
  else if (e.type === 'duration') { try { label = fmtSec(JSON.parse(e.data || '{}').ms / 1000); } catch (_) {} }
  return '<span class="evt-chip ' + e.type + '">' + escapeHtml(label) + '</span>';
}
function renderSessions(sessions) {
  if (!sessions || !sessions.length) return '<p class="dim">no sessions yet</p>';
  return sessions.map((sess, i) => {
    const loc = [sess.city, sess.country].filter(Boolean).join(', ') || 'Unknown location';
    const ref = sess.ref ? trimRef(sess.ref) : '';
    const chips = (sess.events || []).map(evtChip).join('');
    return `<div class="session-card">
      <div class="session-header" onclick="toggleSession(${i})">
        <span class="session-time">${timeAgo(sess.first_ts)}</span>
        <span class="session-loc">${escapeHtml(loc)}</span>
        <span class="session-device">${escapeHtml(parseUA(sess.ua))}</span>
        ${ref ? '<span class="session-ref">via ' + escapeHtml(ref) + '</span>' : ''}
      </div>
      <div class="session-body" id="sess-${i}">
        <div class="session-timeline">${chips}</div>
        ${sess.org ? '<div class="session-org">' + escapeHtml(sess.org) + '</div>' : ''}
      </div>
    </div>`;
  }).join('');
}
function toggleSession(i) { const el = document.getElementById('sess-' + i); if (el) el.classList.toggle('open'); }

renderRangeBar();
load();
</script>
</body>
</html>
