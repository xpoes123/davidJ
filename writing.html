<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<title>Writing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14131a; --bg-2: #1c1b25;
    --fg: #e8e3d8; --fg-soft: #a8a39a; --fg-dim: #6b6862;
    --accent: #d4a955;
    --rule: rgba(255,255,255,0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: 'Newsreader', Georgia, serif; -webkit-font-smoothing: antialiased; }
  body { background: radial-gradient(ellipse at 50% 0%, #1f1d2c 0%, #14131a 60%); min-height: 100vh; }

  .topbar { position: sticky; top: 0; background: rgba(20, 19, 26, 0.85); backdrop-filter: blur(8px); z-index: 10; border-bottom: 1px solid var(--rule); }
  .topbar-inner { max-width: 760px; margin: 0 auto; padding: 18px 28px; display: flex; justify-content: space-between; align-items: center; font-family: 'Space Grotesk', sans-serif; }
  .topbar a { color: var(--fg-soft); text-decoration: none; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; transition: color 0.2s ease; }
  .topbar a:hover { color: var(--fg); }
  .topbar .site { color: var(--fg); font-weight: 500; font-size: 14px; letter-spacing: 0.02em; text-transform: none; }

  main { max-width: 760px; margin: 0 auto; padding: 80px 28px 120px; }

  .page-kicker { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.32em; text-transform: uppercase; margin-bottom: 14px; }
  .page-title { font-family: 'Space Grotesk', sans-serif; font-size: 44px; font-weight: 500; line-height: 1.1; letter-spacing: -0.01em; margin: 0 0 14px; color: var(--fg); }
  .page-sub { font-family: 'Newsreader', serif; font-style: italic; font-size: 18px; color: var(--fg-soft); margin: 0 0 64px; max-width: 540px; }

  .year-header { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--fg-dim); letter-spacing: 0.24em; text-transform: uppercase; margin: 56px 0 24px; padding-bottom: 12px; border-bottom: 1px solid var(--rule); }
  .year-header:first-of-type { margin-top: 0; }

  .entry { display: block; padding: 24px 0; border-bottom: 1px solid var(--rule); text-decoration: none; color: inherit; transition: padding-left 0.25s ease; }
  .entry:hover { padding-left: 12px; }
  .entry:last-child { border-bottom: none; }
  .entry-meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-dim); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px; }
  .entry-meta .dot { margin: 0 8px; opacity: 0.6; }
  .entry-title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 500; margin: 0 0 6px; color: var(--fg); transition: color 0.2s ease; }
  .entry:hover .entry-title { color: var(--accent); }
  .entry-excerpt { font-size: 16px; line-height: 1.6; color: var(--fg-soft); margin: 0; }

  .newsletter { max-width: 760px; margin: 80px auto 0; }
  .newsletter-inner { border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule); padding: 36px 0; text-align: center; }
  .newsletter h3 { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 500; margin: 0 0 6px; color: var(--fg); letter-spacing: 0.01em; }
  .newsletter-pitch { font-family: 'Inter', sans-serif; font-size: 13px; color: var(--fg-dim); margin: 0 0 20px; }
  .newsletter form { display: flex; gap: 8px; max-width: 420px; margin: 0 auto; }
  .newsletter input[type="email"] { flex: 1; background: var(--bg-2); border: 1px solid var(--rule); color: var(--fg); font-family: 'Inter', sans-serif; font-size: 14px; padding: 10px 14px; border-radius: 3px; outline: none; transition: border-color 0.2s ease; }
  .newsletter input[type="email"]:focus { border-color: var(--accent); }
  .newsletter button { background: var(--accent); color: #14131a; border: none; font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; padding: 10px 18px; border-radius: 3px; cursor: pointer; transition: opacity 0.2s ease; }
  .newsletter button:hover { opacity: 0.88; }
  .newsletter button:disabled { opacity: 0.5; cursor: default; }
  .subscribe-msg { margin-top: 14px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--fg-soft); min-height: 18px; }
  .subscribe-msg.error { color: #d68a8a; }

  @media (max-width: 600px) {
    main { padding: 56px 22px 80px; }
    .page-title { font-size: 32px; }
    .entry-title { font-size: 20px; }
  }
</style>
<script src="analytics.js" defer></script>
</head>
<body>
  <nav class="topbar">
    <div class="topbar-inner">
      <a href="index.html">← back</a>
      <span class="site">David Jiang</span>
      <a href="reading.html">reading →</a>
    </div>
  </nav>

  <main>
    <div class="page-kicker">Writing</div>
    <h1 class="page-title">Essays &amp; half-thoughts</h1>
    <p class="page-sub">Whatever I've been thinking long enough to write down. Mostly tech, school, taste, and the long arc of things.</p>

    <div id="list">loading…</div>

    <section class="newsletter">
      <div class="newsletter-inner">
        <h3>Get new posts in your inbox</h3>
        <p class="newsletter-pitch">Occasional, never spammy. Unsubscribe whenever.</p>
        <form id="subscribe-form" novalidate>
          <input type="email" id="subscribe-email" placeholder="you@example.com" required autocomplete="email">
          <button type="submit">Subscribe</button>
        </form>
        <div class="subscribe-msg" id="subscribe-msg"></div>
      </div>
    </section>
  </main>

<script>
const posts = [
  { slug: 'albums',     title: "Albums of '25",  date: '2025-12', subtitle: 'a yearly ritual' },
  { slug: 'graduating', title: 'Graduating',     date: '2023-08', subtitle: 'the lie of the four-year arc' }
];

const MONTHS = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
function formatDate(d) {
  const [y, m] = d.split('-');
  return `${MONTHS[parseInt(m, 10)]} ${y}`;
}

async function fetchExcerpt(slug) {
  try {
    const r = await fetch(`posts/${slug}.md`);
    if (!r.ok) return null;
    let md = await r.text();
    // strip title and date lines
    md = md.replace(/^#\s+.+$/m, '').replace(/^\*\*Date:\*\*.+$/m, '');
    // grab first non-empty paragraph (collapse whitespace)
    const paras = md.split(/\n\n+/).map(p => p.trim()).filter(Boolean);
    let first = paras.find(p => !p.startsWith('#') && !p.startsWith('>') && !p.startsWith('---'));
    if (!first) return null;
    // strip markdown bold/italic/links for excerpt
    first = first.replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                 .replace(/\*\*([^*]+)\*\*/g, '$1')
                 .replace(/\*([^*]+)\*/g, '$1');
    // truncate
    if (first.length > 200) first = first.slice(0, 200).replace(/\s+\S*$/, '') + '…';
    return first;
  } catch (e) { return null; }
}

async function estimateReadingTime(slug) {
  try {
    const r = await fetch(`posts/${slug}.md`);
    if (!r.ok) return null;
    const md = await r.text();
    const words = md.split(/\s+/).filter(Boolean).length;
    return Math.max(1, Math.round(words / 220));
  } catch (e) { return null; }
}

async function build() {
  posts.sort((a, b) => b.date.localeCompare(a.date));
  const list = document.getElementById('list');
  list.innerHTML = '';

  // group by year
  const groups = {};
  posts.forEach(p => {
    const y = p.date.slice(0, 4);
    (groups[y] = groups[y] || []).push(p);
  });
  const years = Object.keys(groups).sort().reverse();

  for (const year of years) {
    const yh = document.createElement('div');
    yh.className = 'year-header';
    yh.textContent = year;
    list.appendChild(yh);

    for (const p of groups[year]) {
      const a = document.createElement('a');
      a.className = 'entry';
      a.href = `post.html?slug=${p.slug}`;
      const minutes = await estimateReadingTime(p.slug);
      const excerpt = await fetchExcerpt(p.slug);
      a.innerHTML = `
        <div class="entry-meta">${formatDate(p.date)}${minutes ? `<span class="dot">·</span>${minutes} min` : ''}</div>
        <div class="entry-title">${p.title}</div>
        <p class="entry-excerpt">${excerpt || p.subtitle || ''}</p>
      `;
      list.appendChild(a);
    }
  }
}

build();

// Newsletter signup
const subscribeForm = document.getElementById('subscribe-form');
const subscribeMsg = document.getElementById('subscribe-msg');
const subscribeEmail = document.getElementById('subscribe-email');
subscribeForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = subscribeEmail.value.trim();
  if (!email) return;
  const btn = subscribeForm.querySelector('button');
  btn.disabled = true;
  subscribeMsg.className = 'subscribe-msg';
  subscribeMsg.textContent = '';
  try {
    const _isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
    const ep = _isLocal ? 'http://localhost:8001/subscribe' : '/api/analytics/subscribe';
    const r = await fetch(ep, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, source: 'writing-index' }),
    });
    const data = await r.json();
    if (data.ok) {
      subscribeMsg.textContent = data.msg || "You're on the list.";
      subscribeEmail.value = '';
    } else {
      subscribeMsg.className = 'subscribe-msg error';
      subscribeMsg.textContent = data.msg || 'Something went wrong.';
    }
  } catch (err) {
    subscribeMsg.className = 'subscribe-msg error';
    subscribeMsg.textContent = "Couldn't reach the server. Try again later.";
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
