<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Jiang — A Plane Partition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #14131a;
    --bg-2: #1c1b25;
    --fg: #e8e3d8;
    --fg-soft: #a8a39a;
    --fg-dim: #6b6862;
    --accent: #d4a955;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
  }
  .scene {
    width: 100vw; height: 100vh;
    position: relative;
    background: radial-gradient(ellipse at 50% 38%, #27243a 0%, #14131a 75%);
    user-select: none;
    -webkit-user-select: none;
  }
  .scene .content { user-select: text; -webkit-user-select: text; }

  /* title plaque (bottom, above timeline) */
  .titlebar {
    position: absolute;
    bottom: 116px; left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.4s ease;
  }
  .titlebar h1 {
    margin: 0;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.04em;
    color: var(--fg);
  }
  .titlebar .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg-dim);
    margin-top: 6px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  body.focused .titlebar { opacity: 0; }

  /* partition matrix (top-right, mathematical notation) */
  .matrix {
    position: absolute;
    top: 36px; right: 38px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg-dim);
    line-height: 1.65;
    z-index: 5;
    text-align: right;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .matrix .label {
    color: var(--fg-soft);
    margin-bottom: 6px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-size: 10px;
  }
  .matrix .rows { display: inline-block; text-align: left; }
  .matrix .rows .row { display: flex; gap: 8px; }
  .matrix .cell { display: inline-block; width: 14px; text-align: center; }
  body.focused .matrix { opacity: 0; }

  /* the partition svg */
  svg.partition {
    width: 100%;
    height: 100%;
    display: block;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
  }
  body.focused svg.partition {
    transform: translateY(-12vh) scale(0.78);
    opacity: 0.75;
  }

  /* soft scrim behind focused content — radial fade, no hard edges */
  .scrim {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 55vw 45vh at 50% 62%, rgba(10, 9, 14, 0.85) 0%, rgba(10, 9, 14, 0.4) 45%, transparent 75%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 3;
  }
  body.focused .scrim { opacity: 1; }

  .cube {
    cursor: pointer;
    transition: opacity 0.5s ease, transform 0.75s cubic-bezier(0.16, 0.84, 0.44, 1);
  }
  .cube polygon {
    stroke: rgba(0, 0, 0, 0.55);
    stroke-width: 0.7;
    stroke-linejoin: round;
    transition: filter 0.25s ease;
  }
  .cube:hover polygon { filter: brightness(1.18); }
  .cube.dimmed { opacity: 0.08; }
  .cube.focused polygon { filter: brightness(1.3); }

  .cube.drop-in {
    transform: translateY(-70vh);
    opacity: 0;
  }

  /* stack labels float above each stack with a thin connector */
  .stack-label-text {
    fill: var(--fg);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    text-anchor: middle;
    font-weight: 500;
    transition: opacity 0.4s ease, fill 0.2s ease;
  }
  .stack-label-text.clickable { cursor: pointer; }
  .stack-label-group:hover .stack-label-text,
  .stack-label-text.clickable:hover {
    fill: var(--accent-color, var(--fg));
    text-decoration: underline;
    text-underline-offset: 5px;
    text-decoration-thickness: 1px;
  }
  .stack-label-count {
    fill: var(--fg-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    pointer-events: none;
    text-anchor: middle;
    letter-spacing: 0.06em;
    transition: opacity 0.4s ease;
  }
  .stack-leader {
    stroke: var(--fg-dim);
    stroke-width: 0.5;
    fill: none;
    transition: opacity 0.4s ease;
  }
  body.focused .stack-label-text,
  body.focused .stack-label-count,
  body.focused .stack-leader {
    opacity: 0.18;
  }

  /* base grid outline (subtle floor of the partition) */
  .base-grid {
    stroke: rgba(255, 255, 255, 0.07);
    stroke-width: 0.5;
    fill: none;
  }
  .base-grid.missing {
    stroke-dasharray: 3 4;
    stroke: rgba(255, 100, 100, 0.20);
  }

  /* hover label (floating HTML tooltip) */
  .cube-label {
    position: absolute;
    pointer-events: none;
    padding: 8px 14px;
    border-radius: 2px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    letter-spacing: 0.04em;
    background: rgba(20, 19, 26, 0.92);
    color: var(--fg);
    border: 1px solid rgba(255,255,255,0.10);
    opacity: 0;
    transition: opacity 0.18s ease;
    transform: translate(-50%, -110%);
    white-space: nowrap;
    z-index: 6;
    backdrop-filter: blur(4px);
  }
  .cube-label.visible { opacity: 1; }
  .cube-label .title { font-weight: 500; }
  .cube-label .sub {
    color: var(--fg-soft);
    font-weight: 300;
    font-size: 11px;
    margin-top: 2px;
    letter-spacing: 0.06em;
  }

  /* focused content */
  .content {
    position: absolute;
    left: 50%;
    bottom: 28%;
    transform: translateX(-50%) translateY(0);
    max-width: 560px;
    width: 88vw;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.45s ease 0.3s, transform 0.45s cubic-bezier(0.4,0,0.2,1) 0.3s;
    z-index: 4;
  }
  body.focused .content { opacity: 1; pointer-events: auto; transform: translate(-50%, -10px); }
  .content .kicker {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .content h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 36px;
    font-weight: 500;
    margin: 0 0 10px;
    letter-spacing: 0.005em;
  }
  .content p {
    color: var(--fg);
    font-size: 16px;
    margin: 0 0 22px;
    line-height: 1.6;
    font-weight: 300;
  }
  .content a {
    color: var(--accent);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--accent);
    padding-bottom: 2px;
  }

  /* back button */
  .back-btn {
    position: absolute;
    top: 34px; left: 36px;
    background: none;
    border: 1px solid rgba(255,255,255,0.18);
    color: var(--fg-soft);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    padding: 9px 16px;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, color 0.2s ease, border-color 0.2s ease;
    z-index: 6;
  }
  .back-btn:hover { color: var(--fg); border-color: rgba(255,255,255,0.4); }
  body.focused .back-btn { opacity: 1; pointer-events: auto; transition-delay: 0.4s; }

  .rotation-hint {
    position: absolute;
    top: 38px; right: 38px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--fg-dim);
    letter-spacing: 0.18em;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.4s ease;
  }
  body.focused .rotation-hint { opacity: 0.25; }

  /* timeline scrubber */
  .timeline {
    position: absolute;
    left: 8vw; right: 8vw; bottom: 44px;
    height: 56px;
    z-index: 7;
  }
  .timeline-rail {
    position: absolute;
    left: 0; right: 0;
    top: 28px;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(255,255,255,0.18) 12%, rgba(255,255,255,0.18) 88%, transparent);
  }
  .tl-bound {
    position: absolute;
    top: 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--fg-dim);
    letter-spacing: 0.12em;
  }
  .tl-bound.left { left: -34px; }
  .tl-bound.right { right: -34px; }
  .tick {
    position: absolute;
    width: 9px; height: 9px;
    top: 23px;
    margin-left: -4.5px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.2s ease;
  }
  .tick:hover {
    transform: scale(1.65);
    box-shadow: 0 0 16px 1px currentColor;
  }
  .tick.active {
    transform: scale(1.75);
    box-shadow: 0 0 18px 1px currentColor;
  }
  .tick-label {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--fg);
    white-space: nowrap;
    background: rgba(20, 19, 26, 0.92);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 4px 9px;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.15s ease;
    pointer-events: none;
  }
  .tick:hover .tick-label,
  .tick.active .tick-label { opacity: 1; }
  .tick-label .lbl-date {
    color: var(--fg-dim);
    font-weight: 300;
    margin-left: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
  }
</style>
<script src="analytics.js" defer></script>
</head>
<body>
  <div class="scene">
    <div class="titlebar">
      <h1>David Jiang</h1>
    </div>

    <svg class="partition" viewBox="-260 -440 620 760" preserveAspectRatio="xMidYMid meet" id="partitionSvg"></svg>
    <div class="scrim"></div>

    <div class="cube-label" id="cubeLabel">
      <div class="title"></div>
      <div class="sub"></div>
    </div>

    <button class="back-btn" id="backBtn">← back</button>

    <div class="content" id="content">
      <div class="kicker" id="contentKicker"></div>
      <h2 id="contentTitle"></h2>
      <p id="contentBody"></p>
      <a id="contentLink" href="#" target="_blank">view</a>
    </div>

    <div class="timeline" id="timeline">
      <span class="tl-bound left">2019</span>
      <span class="tl-bound right">2026</span>
      <div class="timeline-rail"></div>
    </div>

  </div>

<script src="data.js"></script>
<script>
// Site content lives in data.js (window.STACKS). Plane partition rules: heights weakly decreasing in both i and j.
const stacks = window.STACKS;

const MAX_I = 4;
const MAX_J = 2;

// Continuous rotation angle (radians, around z-axis through partition center)
let theta = 0;
// Drag state
let dragStartX = null;
let dragStartTheta = 0;
let dragDistance = 0;

// Partition center (around which we rotate)
const CX = MAX_I / 2;
const CY = MAX_J / 2;

// World-space height map (unchanged by rotation — needed for neighbor checks)
const WORLD_HEIGHTS = {};
stacks.forEach(s => { WORLD_HEIGHTS[`${s.i},${s.j}`] = s.cubes.length; });
function worldHasCube(i, j, k) {
  return k >= 0 && (WORLD_HEIGHTS[`${i},${j}`] || 0) > k;
}

// Isometric projection
const S = 50;
const COS = Math.cos(Math.PI / 6);
const SIN = Math.sin(Math.PI / 6);
function rotZ(p, t) {
  const [x, y, z] = p;
  const c = Math.cos(t), s = Math.sin(t);
  return [x*c - y*s, x*s + y*c, z];
}
// Rotate a 3D point around the partition's vertical axis (through CX, CY)
function rotateAroundCenter(p, t) {
  const [x, y, z] = p;
  const [rx, ry, rz] = rotZ([x - CX, y - CY, z], t);
  return [rx + CX, ry + CY, rz];
}
function project3(p) {
  const [x, y, z] = p;
  return {
    x: (x - y) * S * COS,
    y: (x + y) * S * SIN - z * S
  };
}

function shade(hex, factor) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  const c = v => Math.max(0, Math.min(255, Math.round(v * factor)));
  return `rgb(${c(r)},${c(g)},${c(b)})`;
}

// Face definitions: name → outward normal, neighbor offset, 4 vertices (in unit cube at origin), shade factor
const FACES = {
  px: { n: [1,0,0],  off: [1,0,0],  verts: (i,j,k) => [[i+1,j,k],[i+1,j+1,k],[i+1,j+1,k+1],[i+1,j,k+1]], shade: 0.78 },
  mx: { n: [-1,0,0], off: [-1,0,0], verts: (i,j,k) => [[i,j,k],[i,j+1,k],[i,j+1,k+1],[i,j,k+1]],         shade: 0.78 },
  py: { n: [0,1,0],  off: [0,1,0],  verts: (i,j,k) => [[i,j+1,k],[i+1,j+1,k],[i+1,j+1,k+1],[i,j+1,k+1]], shade: 0.58 },
  my: { n: [0,-1,0], off: [0,-1,0], verts: (i,j,k) => [[i,j,k],[i+1,j,k],[i+1,j,k+1],[i,j,k+1]],         shade: 0.58 },
  pz: { n: [0,0,1],  off: [0,0,1],  verts: (i,j,k) => [[i,j,k+1],[i+1,j,k+1],[i+1,j+1,k+1],[i,j+1,k+1]], shade: 1.10 }
};
const FACE_NAMES = ['px','mx','py','my','pz'];

// Iso camera direction: face is visible if its rotated normal has positive dot with this vector
const CAM_DIR = [1, 1, 1];

const svg = document.getElementById('partitionSvg');
const labelEl = document.getElementById('cubeLabel');
const labelTitle = labelEl.querySelector('.title');
const labelSub = labelEl.querySelector('.sub');

let focusedCubeId = null;

function renderPartition() {
  svg.innerHTML = '';

  // Build cube list with rotated centers (for depth sort)
  const cubeSpecs = [];
  stacks.forEach(stack => {
    for (let k = 0; k < stack.cubes.length; k++) {
      const cube = stack.cubes[stack.cubes.length - 1 - k];
      const centerWorld = [stack.i + 0.5, stack.j + 0.5, k + 0.5];
      const rotCenter = rotateAroundCenter(centerWorld, theta);
      // depth: larger (rx + ry) = closer to camera in iso → draw later
      cubeSpecs.push({
        i: stack.i, j: stack.j, k, color: stack.color, stack, cube,
        depth: rotCenter[0] + rotCenter[1]
      });
    }
  });
  // back-to-front
  cubeSpecs.sort((a, b) => a.depth - b.depth);

  // Split into solid (at least one visible face) and ghost (fully occluded → outline overlay)
  const ghostSpecs = [];
  cubeSpecs.forEach(spec => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'cube');
    g.setAttribute('data-cube', spec.cube.id);
    g.setAttribute('data-stack', spec.stack.label.toLowerCase());
    g._cube = spec.cube;
    g._stack = spec.stack;

    // Track which camera-facing faces are interior — used for the ghost wireframe if all are interior
    const interiorCameraFaces = [];

    for (const fname of FACE_NAMES) {
      const F = FACES[fname];
      // skip if not facing camera
      const nRot = rotZ(F.n, theta);
      const dot = nRot[0]*CAM_DIR[0] + nRot[1]*CAM_DIR[1] + nRot[2]*CAM_DIR[2];
      if (dot <= 0.01) continue;
      // check if interior (neighbor cube exists in world coords)
      const [dx, dy, dz] = F.off;
      if (worldHasCube(spec.i + dx, spec.j + dy, spec.k + dz)) {
        interiorCameraFaces.push(fname);
        continue;
      }
      // visible face: render solid
      const verts = F.verts(spec.i, spec.j, spec.k);
      const proj = verts.map(v => project3(rotateAroundCenter(v, theta)));
      const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      poly.setAttribute('points', proj.map(p => `${p.x},${p.y}`).join(' '));
      poly.setAttribute('fill', shade(spec.color, F.shade));
      g.appendChild(poly);
    }

    if (g.children.length > 0) {
      svg.appendChild(g);
    } else {
      // Fully occluded — defer to ghost pass so it draws on top of everything
      ghostSpecs.push({ spec, faces: interiorCameraFaces });
    }
  });

  // Occluded cubes get an empty <g> in the DOM so querySelector still finds them
  // (lets the timeline scrubber and scroll handler focus them). No visible rendering.
  ghostSpecs.forEach(({ spec }) => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', 'cube ghost');
    g.setAttribute('data-cube', spec.cube.id);
    g.setAttribute('data-stack', spec.stack.label.toLowerCase());
    g._cube = spec.cube;
    g._stack = spec.stack;
    svg.appendChild(g);
  });

  // stack labels at rotated top-center of each stack
  stacks.forEach(stack => {
    const h = stack.cubes.length;
    if (h === 0) return;
    const top = rotateAroundCenter([stack.i + 0.5, stack.j + 0.5, h], theta);
    const proj = project3(top);
    const labelY = proj.y - 32;
    const leader = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    leader.setAttribute('class', 'stack-leader');
    leader.setAttribute('x1', proj.x);
    leader.setAttribute('y1', proj.y - 2);
    leader.setAttribute('x2', proj.x);
    leader.setAttribute('y2', labelY + 6);
    svg.appendChild(leader);
    const labelText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    labelText.setAttribute('class', stack.archiveHref ? 'stack-label-text clickable' : 'stack-label-text');
    labelText.setAttribute('x', proj.x);
    labelText.setAttribute('y', labelY);
    labelText.textContent = stack.label;

    if (stack.archiveHref) {
      labelText.style.setProperty('--accent-color', stack.color);
      const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      group.setAttribute('class', 'stack-label-group');
      group.style.cursor = 'pointer';
      // Tight hit-rect sized to the actual rendered text bbox (+ small padding)
      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      hit.setAttribute('fill', 'transparent');
      group.appendChild(hit);
      group.appendChild(labelText);
      group.addEventListener('click', (e) => {
        if (dragDistance > 5) return;
        e.stopPropagation();
        if (window.track) window.track('label_click', { stack: stack.label, href: stack.archiveHref });
        window.location.href = stack.archiveHref;
      });
      svg.appendChild(group);
      const b = labelText.getBBox();
      hit.setAttribute('x', b.x - 3);
      hit.setAttribute('y', b.y - 2);
      hit.setAttribute('width', b.width + 6);
      hit.setAttribute('height', b.height + 4);
    } else {
      svg.appendChild(labelText);
    }
  });

  attachCubeListeners();
  reapplyFocus();
}

function reapplyFocus() {
  if (!focusedCubeId) return;
  document.querySelectorAll('.cube').forEach(c => {
    c.classList.toggle('dimmed', c.dataset.cube !== focusedCubeId);
    c.classList.toggle('focused', c.dataset.cube === focusedCubeId);
  });
}

function attachCubeListeners() {
  document.querySelectorAll('.cube').forEach(c => {
    c.addEventListener('mouseenter', () => {
      if (document.body.classList.contains('focused')) return;
      if (dragStartX !== null) return;  // don't show label while dragging
      const cube = c._cube;
      labelTitle.textContent = cube.title;
      labelSub.textContent = cube.subtitle || '';
      const r = c.getBoundingClientRect();
      labelEl.style.left = (r.left + r.width / 2) + 'px';
      labelEl.style.top = (r.top + 8) + 'px';
      labelEl.classList.add('visible');
    });
    c.addEventListener('mouseleave', () => labelEl.classList.remove('visible'));
    c.addEventListener('click', (e) => {
      if (dragDistance > 5) return;  // suppress click after drag
      focusCube(c);
    });
  });
}

// Mouse drag rotation
const scene = document.querySelector('.scene');
scene.addEventListener('mousedown', e => {
  dragStartX = e.clientX;
  dragStartTheta = theta;
  dragDistance = 0;
  scene.style.cursor = 'grabbing';
});
document.addEventListener('mousemove', e => {
  if (dragStartX === null) return;
  const dx = e.clientX - dragStartX;
  dragDistance = Math.abs(dx);
  if (dragDistance > 3) {
    theta = dragStartTheta + dx * 0.012;
    renderPartition();
    labelEl.classList.remove('visible');
  }
});
document.addEventListener('mouseup', () => {
  dragStartX = null;
  scene.style.cursor = '';
  // reset drag distance after a tick so click handler sees it
  setTimeout(() => { dragDistance = 0; }, 50);
});

// Focus
const backBtn = document.getElementById('backBtn');
const contentEl = document.getElementById('content');
const contentKicker = document.getElementById('contentKicker');
const contentTitle = document.getElementById('contentTitle');
const contentBody = document.getElementById('contentBody');
const contentLink = document.getElementById('contentLink');

function focusCube(cubeEl) {
  labelEl.classList.remove('visible');
  const cube = cubeEl._cube;
  const stack = cubeEl._stack;
  focusedCubeId = cube.id;
  // Keep the scroll-navigation index in sync with whichever cube is now focused.
  if (cube.date && typeof allCubes !== 'undefined') {
    const idx = allCubes.findIndex(c => c.id === cube.id);
    if (idx >= 0) scrollIdx = idx;
  }
  if (window.track) window.track('cube_click', { cube: cube.id, stack: stack.label });
  document.body.classList.add('focused');
  document.querySelectorAll('.cube').forEach(c => {
    c.classList.toggle('dimmed', c !== cubeEl);
    c.classList.toggle('focused', c === cubeEl);
  });
  contentKicker.textContent = stack.label;
  contentKicker.style.color = stack.color;
  contentTitle.textContent = cube.title;
  contentBody.textContent = cube.body || cube.subtitle || '';
  if (cube.href) {
    contentLink.href = cube.href;
    contentLink.style.display = '';
  } else {
    contentLink.style.display = 'none';
  }
  document.querySelectorAll('.tick').forEach(t => {
    t.classList.toggle('active', t.dataset.cubeId === cube.id);
  });
}
function unfocus() {
  focusedCubeId = null;
  scrollIdx = -1;
  document.body.classList.remove('focused');
  document.querySelectorAll('.cube').forEach(c => c.classList.remove('dimmed', 'focused'));
  document.querySelectorAll('.tick').forEach(t => t.classList.remove('active'));
}
backBtn.addEventListener('click', unfocus);

// Keyboard rotation: animate to nearest ±90° step
let animFrame = null;
function animateRotation(target) {
  if (animFrame) cancelAnimationFrame(animFrame);
  const start = theta;
  const t0 = performance.now();
  const duration = 450;
  function step(now) {
    const p = Math.min(1, (now - t0) / duration);
    const eased = p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2;
    theta = start + (target - start) * eased;
    renderPartition();
    if (p < 1) animFrame = requestAnimationFrame(step);
    else animFrame = null;
  }
  animFrame = requestAnimationFrame(step);
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') unfocus();
  else if (e.key === 'ArrowLeft') animateRotation(theta + Math.PI / 2);
  else if (e.key === 'ArrowRight') animateRotation(theta - Math.PI / 2);
});

// Click outside the focused area → unfocus
document.addEventListener('click', e => {
  if (!document.body.classList.contains('focused')) return;
  if (dragDistance > 5) return;  // drag, not click
  const safe = ['.cube', '.content', '.back-btn', '.tick'];
  if (safe.some(sel => e.target.closest(sel))) return;
  unfocus();
});

// Timeline: flatten all cubes, sort by date
const allCubes = [];
stacks.forEach(stack => stack.cubes.forEach(cube => {
  if (!cube.date) return;  // skip undated (e.g. social links)
  allCubes.push({ ...cube, stackLabel: stack.label, color: stack.color });
}));
allCubes.sort((a, b) => a.date.localeCompare(b.date));

// --- Scroll-to-navigate-timeline ---
// The homepage has no normal scroll; route wheel events through the chronological
// timeline. Trackpad inertia fires dozens of wheel events per gesture, so we
// step exactly ONCE per gesture and ignore the rest until the user pauses.
let scrollIdx = -1;
let scrollGestureActive = false;
let scrollGestureTimer = null;
const SCROLL_GESTURE_END_MS = 160;  // pause that resets the gesture
window.addEventListener('wheel', (e) => {
  e.preventDefault();
  if (allCubes.length === 0) return;
  if (Math.abs(e.deltaY) + Math.abs(e.deltaX) < 4) return;

  // Refresh the end-of-gesture timer on every wheel event
  clearTimeout(scrollGestureTimer);
  scrollGestureTimer = setTimeout(() => { scrollGestureActive = false; }, SCROLL_GESTURE_END_MS);

  if (scrollGestureActive) return;  // already stepped for this gesture
  scrollGestureActive = true;

  const dir = (e.deltaY + e.deltaX) > 0 ? 1 : -1;
  // dir > 0 (scrolling down/right) → newer cube (right on timeline)
  if (scrollIdx === -1) {
    scrollIdx = dir > 0 ? 0 : allCubes.length - 1;
  } else {
    scrollIdx = Math.max(0, Math.min(allCubes.length - 1, scrollIdx + dir));
  }
  const cube = allCubes[scrollIdx];
  const el = document.querySelector(`.cube[data-cube="${cube.id}"]`);
  if (el) focusCube(el);
}, { passive: false });
const minD = new Date(allCubes[0].date);
const maxD = new Date(allCubes[allCubes.length - 1].date);
const span = maxD - minD;
document.querySelector('.tl-bound.left').textContent = allCubes[0].date.slice(0, 4);
document.querySelector('.tl-bound.right').textContent = allCubes[allCubes.length - 1].date.slice(0, 4);

const timeline = document.getElementById('timeline');
allCubes.forEach(cube => {
  const t = span === 0 ? 0.5 : (new Date(cube.date) - minD) / span;
  const tick = document.createElement('div');
  tick.className = 'tick';
  tick.style.left = `${t * 100}%`;
  tick.style.background = cube.color;
  tick.style.color = cube.color;
  tick.dataset.cubeId = cube.id;
  const lbl = document.createElement('div');
  lbl.className = 'tick-label';
  lbl.innerHTML = `${cube.title}<span class="lbl-date">${cube.date}</span>`;
  tick.appendChild(lbl);
  tick.addEventListener('click', () => {
    const el = document.querySelector(`.cube[data-cube="${cube.id}"]`);
    if (el) focusCube(el);
  });
  timeline.appendChild(tick);
});

// Initial render
renderPartition();
// Set the scene cursor to indicate draggability
scene.style.cursor = 'grab';
</script>
</body>
</html>
